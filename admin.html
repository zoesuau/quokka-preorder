<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#3d332d" />
    <title>鼠購易｜商品後台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css?v=20260719-twd-price" />
    <link rel="stylesheet" href="admin.css?v=20260722-status-notify" />
    <script src="config.js?v=20260717-liff" defer></script>
    <script src="admin.js?v=20260722-status-notify" defer></script>
  </head>
  <body class="admin-page">
    <header class="admin-header">
      <div><p class="eyebrow">MOBILE ADMIN</p><h1 id="adminPageTitle">訂單管理</h1></div>
      <button class="admin-refresh" type="button" id="refreshProducts">重新整理</button>
    </header>

    <main class="admin-main">
      <section class="admin-login-card" id="adminLoginCard">
        <p class="eyebrow">ADMIN SIGN IN</p>
        <h2>登入商品後台</h2>
        <p>請輸入管理登入碼，登入後可用手機新增、修改與上下架商品。</p>
        <form id="adminLoginForm">
          <label class="field"><span>管理登入碼</span><input id="adminAccessCode" type="password" inputmode="numeric" autocomplete="current-password" required /></label>
          <button class="primary-button" id="adminLoginButton" type="submit">登入後台</button>
        </form>
        <div class="login-feedback" id="adminLoginFeedback"></div>
      </section>

      <div id="adminWorkspace" hidden>
      <nav class="admin-page-tabs" aria-label="後台頁面">
        <button class="active" type="button" data-admin-page="orders">訂單管理</button>
        <button type="button" data-admin-page="products">商品管理</button>
      </nav>

      <section class="admin-page-panel" id="adminOrdersPage">

      <section class="purchase-summary-card">
        <div class="purchase-summary-heading"><div><p class="eyebrow">PURCHASE TOTAL</p><h2>採買統計</h2></div><span>不含已取消訂單</span></div>
        <div class="purchase-total-grid">
          <div><strong id="orderCount">0</strong><span>總訂單數</span></div>
          <div><strong id="orderedItemCount">0</strong><span>商品總件數</span></div>
        </div>
        <div class="purchase-item-list" id="purchaseItemList"></div>
      </section>

      <section class="admin-orders-section">
        <div class="purchase-summary-heading"><div><p class="eyebrow">ORDER PACKING</p><h2>訂單與包貨</h2></div><span id="unshippedCount">0 筆待收訂金</span></div>
        <div class="order-admin-toolbar">
          <label class="admin-search"><span>搜尋</span><input id="orderSearch" type="search" placeholder="訂單、姓名或電話" /></label>
          <select id="orderStatusFilter" aria-label="訂單狀態"><option value="active">進行中</option><option value="待收訂金">待收訂金</option><option value="已收到訂金">已收到訂金</option><option value="已開設 iOPEN Mall 賣場">已開設 iOPEN Mall 賣場</option><option value="已取消">已取消</option><option value="all">全部訂單</option></select>
        </div>
        <div class="admin-order-list" id="adminOrderList"></div>
      </section>
      </section>

      <section class="admin-page-panel" id="adminProductsPage" hidden>
      <section class="admin-intro">
        <div><strong id="activeCount">0</strong><span>上架中</span></div>
        <div><strong id="totalCount">0</strong><span>全部商品</span></div>
        <button class="primary-button" type="button" id="newProduct">＋ 新增商品</button>
      </section>

      <details class="settings-card">
        <summary>預購設定</summary>
        <form id="settingsForm">
          <label class="switch-field sale-closed-switch"><span>前台停賣</span><input id="saleClosed" type="checkbox" /><i></i></label>
          <label class="field"><span>停賣公告</span><textarea id="saleClosedNotice" rows="3" maxlength="300" placeholder="本次連線已結束，謝謝大家的支持！"></textarea></label>
          <p class="order-first-note"><strong>訂金規則</strong><br />商品總額的 50%，回國後支付剩餘商品款。</p>
          <label class="field"><span>前台預購說明</span><textarea id="adminPreorderNotice" rows="3" maxlength="300"></textarea></label>
          <h3 class="settings-subtitle">匯款帳號</h3>
          <div class="settings-grid">
            <label class="field"><span>銀行名稱</span><input id="bankName" maxlength="50" placeholder="例如：連線商業銀行" /></label>
            <label class="field"><span>銀行代碼</span><input id="bankCode" maxlength="10" inputmode="numeric" placeholder="824" /></label>
          </div>
          <label class="field"><span>匯款帳號</span><input id="bankAccount" maxlength="30" inputmode="numeric" placeholder="輸入完整帳號" /></label>
          <label class="field"><span>戶名</span><input id="bankAccountName" maxlength="50" /></label>
          <label class="field"><span>匯款補充說明（小卡不顯示）</span><textarea id="bankTransferInfoSetting" rows="2" maxlength="300" placeholder="例如：匯款後請在 LINE 回報後五碼"></textarea></label>
          <label class="bank-qr-uploader" for="bankQrInput">
            <img id="bankQrPreview" alt="匯款 QR Code 預覽" />
            <span id="bankQrHint">上傳匯款 QR Code（小卡不顯示）</span>
            <input id="bankQrInput" type="file" accept="image/jpeg,image/png,image/webp" />
          </label>
          <input id="bankQrUrl" type="hidden" />
          <div class="upload-progress" id="bankQrProgress" hidden>正在上傳 QR Code…</div>
          <label class="field"><span>iOPEN Mall 賣場網址（開設賣場後顯示於訂單）</span><input id="iopenMallUrl" type="url" maxlength="500" /></label>
          <button class="secondary-button" type="submit">儲存預購設定</button>
        </form>
      </details>

      <div class="admin-toolbar">
        <label class="admin-search"><span>搜尋</span><input id="productSearch" type="search" placeholder="商品名稱或分類" /></label>
        <select id="statusFilter" aria-label="上架狀態"><option value="all">全部狀態</option><option value="active">上架中</option><option value="inactive">已下架</option></select>
      </div>

      <div class="status-panel" id="adminStatus">正在確認管理員身分…</div>
      <section class="admin-product-list" id="adminProductList"></section>
      </section>
      </div>
    </main>

    <dialog class="editor-dialog" id="productEditor">
      <div class="checkout-header">
        <div><p class="eyebrow">PRODUCT EDITOR</p><h2 id="editorTitle">新增商品</h2></div>
        <form method="dialog"><button class="dialog-close" aria-label="關閉">×</button></form>
      </div>
      <form id="productForm">
        <input id="productId" type="hidden" />
        <label class="image-uploader" for="productImageInput">
          <img id="productImagePreview" alt="商品預覽" />
          <span id="imageUploadHint">拍照或從相簿選擇</span>
          <input id="productImageInput" type="file" accept="image/jpeg,image/png,image/webp" />
        </label>
        <input id="productImageUrl" type="hidden" />
        <div class="upload-progress" id="uploadProgress" hidden>正在壓縮並上傳圖片…</div>

        <label class="field"><span>商品名稱 *</span><input id="productName" required maxlength="100" placeholder="例如：矮袋鼠露營鑰匙圈" /></label>
        <div class="settings-grid">
          <label class="field"><span>分類 *</span><input id="productCategory" required maxlength="30" list="categorySuggestions" placeholder="吊飾" /></label>
          <label class="field"><span>台幣售價 *</span><input id="productTwdPrice" required type="number" min="1" step="1" inputmode="numeric" placeholder="例如：350" /></label>
        </div>
        <datalist id="categorySuggestions"><option value="吊飾"></option><option value="文具"></option><option value="收納"></option><option value="玩偶"></option><option value="生活小物"></option></datalist>
        <div class="price-preview">前台販售價格：<strong id="adminTwdPreview">NT$0</strong></div>
        <label class="field"><span>款式（用逗號或換行分隔）</span><textarea id="productVariants" rows="2" maxlength="300" placeholder="QUOKKA, BOBO"></textarea></label>
        <label class="field"><span>商品說明</span><textarea id="productDescription" rows="3" maxlength="500" placeholder="尺寸、材質或現場注意事項"></textarea></label>
        <div class="settings-grid">
          <label class="field"><span>排序</span><input id="productSortOrder" type="number" step="1" min="0" /></label>
          <label class="switch-field"><span>立即上架</span><input id="productActive" type="checkbox" checked /><i></i></label>
        </div>
        <button class="primary-button" id="saveProduct" type="submit">儲存商品</button>
      </form>
    </dialog>
    <div class="toast" id="toast" role="status"></div>
  </body>
</html>
